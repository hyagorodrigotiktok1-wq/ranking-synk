name: Coletar dados Instagram

on:
  schedule:
    - cron: '7 11 * * *'  # 08:07 BRT (UTC-3 = UTC+0 às 11:07)
  workflow_dispatch:       # permite rodar manualmente

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Coletar dados
        env:
          IG_SESSION_ID: ${{ secrets.IG_SESSION_ID }}
        run: python collect.py

      - name: Commit e push data/latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --cached --quiet || git commit -m "chore: atualizar dados $(date -u +'%Y-%m-%d')"
          git push
